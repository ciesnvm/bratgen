<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Brat Generator</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      text-align: center;
      background-color: #121212;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    #page-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px;
      box-sizing: border-box;
      min-height: 100vh;
    }

    /* THE CANVAS BOX (Pure White) */
    #memeContainer {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 90vw;
      max-width: 380px;
      aspect-ratio: 1 / 1;
      background-color: #FFF;
      border: 6px solid #000;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      margin-bottom: 15px;
      overflow: hidden;
    }

    #textOverlay {
      position: absolute;
      width: 85%;
      height: 75%;
      text-align: justify;
      text-align-last: justify;
      color: #000;
      font-family: "Arial Narrow", "Arial", sans-serif;
      font-size: 120px; 
      line-height: 0.85; 
      letter-spacing: -2px;
      text-transform: lowercase; 
      filter: blur(1.5px); 
      transform: scaleX(0.9); 
    }

    /* Panels & Mode Switchers */
    .panel {
      width: 100%;
      max-width: 392px;
      background: #1e1e1e;
      padding: 15px;
      border-radius: 16px;
      margin-bottom: 12px;
      box-sizing: border-box;
      text-align: left;
    }

    .mode-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      width: 100%;
      max-width: 392px;
    }

    .mode-btn {
      flex: 1;
      padding: 12px;
      font-weight: bold;
      background: #2b2b2b;
      color: #aaa;
      border: 2px solid transparent;
      border-radius: 12px;
      cursor: pointer;
    }

    .mode-btn.active {
      background: #8ACE00;
      color: #000;
      border-color: #8ACE00;
    }

    .search-box, .action-block {
      display: flex;
      gap: 10px;
    }

    input, button {
      padding: 12px;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #2b2b2b;
      color: #fff;
      outline: none;
      box-sizing: border-box;
    }

    input { flex: 1; }
    
    button.accent {
      background-color: #8ACE00;
      color: #000;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    button:disabled { opacity: 0.3; }

    .full-btn {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      font-size: 15px;
    }

    #songResults, #lyricControls, #manualControls { display: none; }
    
    .song-item {
      padding: 12px;
      border-bottom: 1px solid #333;
      cursor: pointer;
      font-size: 13px;
    }
    .song-item:hover { background: #2b2b2b; }

    /* Custom Mobile Double Range Slider Styling */
    .range-slider-container {
      position: relative;
      width: 100%;
      height: 40px;
      margin-top: 10px;
    }

    .slider-track {
      position: absolute;
      width: 100%;
      height: 6px;
      background: #333;
      top: 50%;
      transform: translateY(-50%);
      border-radius: 3px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      position: absolute;
      background: transparent;
      pointer-events: none;
      top: 50%;
      transform: translateY(-50%);
      margin: 0;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      pointer-events: auto;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #8ACE00;
      cursor: pointer;
    }

    .time-label {
      font-size: 13px;
      color: #8ACE00;
      margin-top: 4px;
      font-weight: bold;
    }

    #status { font-size: 13px; color: #8ACE00; text-align: center; margin-top: 4px; }
  </style>
</head>
<body>

<div id="page-wrapper">
  
  <div id="memeContainer">
    <div id="textOverlay">brat</div>
  </div>

  <div class="mode-selector">
    <button class="mode-btn active" id="setManualMode">Text</button>
    <button class="mode-btn" id="setLyricMode">Lyrics</button>
  </div>
  
  <div class="panel" id="manualControls" style="display: block;">
    <h3 style="margin: 0 0 10px 0; color: #8ACE00;">Type Content</h3>
    <div class="action-block">
      <input type="text" id="manualTextInput" value="brat">
      <button class="accent" id="saveStaticBtn">Save Image</button>
    </div>
  </div>

  <div id="lyricControls" style="width:100%; max-width:392px;">
    <div class="panel">
      <h3 style="margin:0 0 10px 0; color:#8ACE00;">1. Search Song</h3>
      <div class="search-box">
        <input type="text" id="searchQuery" placeholder="e.g. SMOKE IT OFF">
        <button class="accent" id="searchBtn">Find</button>
      </div>
      <div id="status"></div>
      <div id="songResults"></div>
    </div>

    <div class="panel" id="lyricCutterPanel" style="display:none;">
      <h3 style="margin:0 0 5px 0; color:#8ACE00;">2. Lyrics Selector Window</h3>
      <div id="startDisplay" class="time-label">Start: [00:00] --</div>
      <div id="endDisplay" class="time-label">End: [00:00] --</div>
      
      <div class="range-slider-container">
        <div class="slider-track"></div>
        <input type="range" id="startSlider" min="0" max="100" value="0">
        <input type="range" id="endSlider" min="0" max="100" value="20">
      </div>

      <button id="playBtn" class="accent full-btn">▶ Preview</button>
      <button id="exportVideoBtn" class="full-btn" style="background:#fff; color:#000; font-weight:bold; border:none;">💾 Export MP4 Clip</button>
    </div>
  </div>

</div>

<!-- Core Script Engine Libraries -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- Modern client-side MP4 container library -->
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@1.3.1/build/mp4-muxer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.2.2/build/mp4-muxer.min.js"></script>

<script>
  // --- Binary TextFit Engine ---
  (function() {
    var defaultSettings = { multiLine: true, minFontSize: 8, maxFontSize: 200 };
    window.textFit = function(els) {
      if (typeof els.toArray === "function") els = els.toArray();
      if (Object.prototype.toString.call(els) !== '[object Array]') els = [els];
      for (var i = 0; i < els.length; i++) { processItem(els[i], defaultSettings); }
    };
    function processItem(el, settings) {
      var innerSpan, originalHTML = el.innerHTML;
      var originalWidth = el.getBoundingClientRect().width - parseInt(window.getComputedStyle(el).paddingLeft || 0) - parseInt(window.getComputedStyle(el).paddingRight || 0);
      var originalHeight = el.getBoundingClientRect().height - parseInt(window.getComputedStyle(el).paddingTop || 0) - parseInt(window.getComputedStyle(el).paddingBottom || 0);
      if (!originalWidth || !originalHeight) return;
      if (originalHTML.indexOf('textFitted') === -1) {
        innerSpan = document.createElement('span'); innerSpan.className = 'textFitted';
        innerSpan.style.display = 'inline-block'; innerSpan.innerHTML = originalHTML;
        el.innerHTML = ''; el.appendChild(innerSpan);
      } else { innerSpan = el.querySelector('span.textFitted'); }
      var low = settings.minFontSize, high = settings.maxFontSize, size = low;
      while (low <= high) {
        var mid = (high + low) >> 1; innerSpan.style.fontSize = mid + 'px';
        var rect = innerSpan.getBoundingClientRect();
        if (rect.width <= originalWidth && rect.height <= originalHeight) { size = mid; low = mid + 1; } else { high = mid - 1; }
      }
      innerSpan.style.fontSize = size + 'px';
    }
  })();

  // --- Runtime Properties State ---
  let globalRawLines = [];
  let globalParsedTimeline = [];
  let playbackAnimationId = null;
  let selectedStartSeconds = 0;
  let selectedEndSeconds = 0;

  // --- Layout Engine Router ---
  $('#setManualMode').click(function() {
    $('.mode-btn').removeClass('active'); $(this).addClass('active');
    $('#manualControls').show(); $('#lyricControls').hide();
    textOverlay.innerText = $('#manualTextInput').val(); textFit(textOverlay);
  });
  $('#setLyricMode').click(function() {
    $('.mode-btn').removeClass('active'); $(this).addClass('active');
    $('#manualControls').hide(); $('#lyricControls').show();
    textOverlay.innerText = "brat"; textFit(textOverlay);
  });

  // --- Manual Mode Handling ---
  document.getElementById('manualTextInput').addEventListener('input', function() {
    this.value = this.value.toLowerCase();
    textOverlay.innerText = this.value;
    textFit(textOverlay);
  });
  // --- Updated Manual Mode Handling (With Blur & Clean Edges) ---
  $('#saveStaticBtn').click(function() {
    const target = document.getElementById('memeContainer');
    
    html2canvas(target, { 
      backgroundColor: '#FFF', 
      scale: 2,
      onclone: (clonedDoc) => {
        // Strip the border and shadow so they don't cause black artifacts in the export
        const clonedContainer = clonedDoc.getElementById('memeContainer');
        clonedContainer.style.boxShadow = 'none';
        clonedContainer.style.border = 'none';
      }
    }).then(canvas => {
      // Create a secondary canvas to manually apply the blur filter html2canvas missed
      const blurCanvas = document.createElement('canvas');
      blurCanvas.width = canvas.width;
      blurCanvas.height = canvas.height;
      const bCtx = blurCanvas.getContext('2d');
      
      // Since scale is 2, we multiply the 1.5px blur by 2 to keep it looking accurate
      bCtx.filter = 'blur(3px)'; 
      bCtx.drawImage(canvas, 0, 0);

      const link = document.createElement('a'); 
      link.download = 'brat.png';
      link.href = blurCanvas.toDataURL('image/png'); 
      link.click();
    });
  });

  // --- Synced Lyrics Search Handling ---
  $('#searchBtn').click(async () => {
    const q = $('#searchQuery').val().trim(); if (!q) return;
    $('#status').text("Searching database...");
    $('#songResults').html("").hide(); $('#lyricCutterPanel').hide();

    try {
      const res = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      const synced = data.filter(t => t.syncedLyrics);
      if(synced.length === 0) { $('#status').text("No time-synced lyrics found."); return; }

      $('#status').text("Select your variant track:");
      $('#songResults').show();
      synced.slice(0,3).forEach(track => {
        const item = $('<div class="song-item"></div>').text(`${track.trackName} — ${track.artistName}`);
        item.click(() => loadLrcData(track.syncedLyrics));
        $('#songResults').append(item);
      });
    } catch(e) { $('#status').text("Network error fetching song tracks."); }
  });

  function parseLrcTime(str) {
    const match = str.match(/\[(\d+):(\d+)\.(\d+)\]/);
    if (!match) return null;
    return parseInt(match[1],10)*60 + parseInt(match[2],10) + parseInt(match[3],10)/100;
  }

  function formatTimeDisplay(secs) {
    return new Date(secs * 1000).toISOString().substr(14, 5);
  }

  // --- Slider Timeline Window Logic ---
  function loadLrcData(lrcText) {
    $('#songResults').hide(); $('#status').text("Track processed successfully!");
    globalRawLines = [];
    
    lrcText.split('\n').forEach(line => {
      const time = parseLrcTime(line);
      const text = line.replace(/\[\d+:\d+\.\d+\]/, '').trim();
      if(time !== null && text) globalRawLines.push({ time, text });
    });
    globalRawLines.sort((a,b) => a.time - b.time);
    globalParsedTimeline = generateWordLevelTimeline(globalRawLines);

    // Dynamic slider range setup
    const totalLines = globalRawLines.length;
    $('#startSlider').attr({ min: 0, max: totalLines - 1 }).val(0);
    $('#endSlider').attr({ min: 0, max: totalLines - 1 }).val(Math.min(totalLines - 1, 5));
    
    updateSliderValues();
    $('#lyricCutterPanel').show();
  }

  function updateSliderValues() {
    let startIdx = parseInt($('#startSlider').val());
    let endIdx = parseInt($('#endSlider').val());

    if(startIdx >= endIdx) {
      endIdx = startIdx + 1;
      if(endIdx >= globalRawLines.length) endIdx = globalRawLines.length - 1;
      $('#endSlider').val(endIdx);
    }

    const startObj = globalRawLines[startIdx];
    const endObj = globalRawLines[endIdx];
    selectedStartSeconds = startObj.time;
    selectedEndSeconds = endObj.time + 3.0; // Extend video 3 seconds past the last line stamp

    $('#startDisplay').text(`Start: [${formatTimeDisplay(startObj.time)}] ${startObj.text.substr(0,22)}...`);
    $('#endDisplay').text(`End: [${formatTimeDisplay(endObj.time)}] ${endObj.text.substr(0,22)}...`);
  }

  $('#startSlider, #endSlider').on('input', updateSliderValues);

  function generateWordLevelTimeline(linesArray) {
    let timeline = [];
    for (let i = 0; i < linesArray.length; i++) {
      const curr = linesArray[i];
      const nextTime = (i < linesArray.length - 1) ? linesArray[i+1].time : curr.time + 3.5;
      const words = curr.text.split(/\s+/).filter(w => w.length > 0);
      if(words.length === 0) continue;
      
      const step = (nextTime - curr.time) / words.length;
      for (let j = 0; j < words.length; j++) {
        timeline.push({
          time: curr.time + (j * step),
          text: words.slice(0, j + 1).join(' ')
        });
      }
      timeline.push({ time: nextTime - 0.02, text: "" });
    }
    return timeline.sort((a,b) => a.time - b.time);
  }

  // --- Preview Player ---
  document.getElementById('playBtn').addEventListener('click', () => {
    if(playbackAnimationId) cancelAnimationFrame(playbackAnimationId);
    let runStartTime = performance.now();
    const targetFrames = globalParsedTimeline.filter(f => f.time >= selectedStartSeconds && f.time <= selectedEndSeconds);

    function runPreview() {
      let elapsed = (performance.now() - runStartTime) / 1000;
      let targetTime = selectedStartSeconds + elapsed;
      let activeFrame = null;

      for (let f of targetFrames) {
        if (targetTime >= f.time) activeFrame = f; else break;
      }
      if (activeFrame) { textOverlay.innerText = activeFrame.text; textFit(textOverlay); }

      if (targetTime < selectedEndSeconds) {
        playbackAnimationId = requestAnimationFrame(runPreview);
      } else {
        textOverlay.innerText = "brat"; textFit(textOverlay);
      }
    }
    playbackAnimationId = requestAnimationFrame(runPreview);
  });

// --- DETERMINISTIC MP4 ENCODER ENGINE (No Hardware Lag) ---
  document.getElementById('exportVideoBtn').addEventListener('click', async () => {
    const targetBox = document.getElementById('memeContainer');
    const targetFrames = globalParsedTimeline.filter(f => f.time >= selectedStartSeconds && f.time <= selectedEndSeconds);
    if(targetFrames.length === 0) return;

    // Check for browser WebCodecs API support
    if (!window.VideoEncoder) {
      alert("Your browser doesn't support WebCodecs. Please use a modern desktop browser like Chrome, Edge, or Safari 15.4+.");
      return;
    }

    const btn = document.getElementById('exportVideoBtn');
    btn.disabled = true; btn.innerText = "Checking Codecs...";

    const fps = 30;
    const durationSeconds = selectedEndSeconds - selectedStartSeconds;
    const totalFramesCount = Math.floor(durationSeconds * fps);

    // List of common H.264 profiles to test against the device's hardware hardware layer
    const codecsToTry = [
      'avc1.42001f', // Baseline Profile, Level 3.1 (99.6% support - ultra-safe for mobile/budget chipsets)
      'avc1.4d001f', // Main Profile, Level 3.1
      'avc1.4d0034', // Main Profile, Level 5.2 (Common on Desktop)
      'avc1.64001f'  // High Profile, Level 3.1
    ];

    let chosenCodec = null;
    for (const codec of codecsToTry) {
      try {
        const testConfig = {
          codec: codec,
          width: 500,
          height: 500,
          bitrate: 2500000,
          framerate: fps
        };
        const support = await VideoEncoder.isConfigSupported(testConfig);
        if (support.supported) {
          chosenCodec = codec;
          break;
        }
      } catch (e) {
        // Fallthrough if browser rejects config dictionary shape completely
      }
    }

    if (!chosenCodec) {
      alert("Unsupported Device Configuration: Your browser did not expose any usable H.264 WebCodec profiles.");
      btn.disabled = false; btn.innerText = "💾 Export MP4 Clip";
      return;
    }

    btn.innerText = "Preparing Encoder...";

    // Setup working canvas for precise 500x500 mp4 frame sizing
    const captureCanvas = document.createElement('canvas');
    captureCanvas.width = 500; 
    captureCanvas.height = 500;
    const ctx = captureCanvas.getContext('2d');

    // 1. Initialize MP4 Muxer
    const muxer = new Mp4Muxer.Muxer({
      target: new Mp4Muxer.ArrayBufferTarget(),
      video: {
        codec: 'avc', // Tells mp4-muxer container to format metadata tracks for H.264 stream
        width: 500,
        height: 500
      },
      fastStart: 'in-memory'
    });

    // 2. Initialize Native VideoEncoder with dynamically confirmed codec profile
    const encoder = new VideoEncoder({
      output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
      error: (e) => {
        console.error(e);
        btn.disabled = false;
        btn.innerText = "💾 Export MP4";
      }
    });

    encoder.configure({
      codec: chosenCodec,
      width: 500,
      height: 500,
      bitrate: 2500000, 
      framerate: fps
    });

// 3. Sequentially process frames frame-by-frame
    for (let currentFrameNum = 0; currentFrameNum <= totalFramesCount; currentFrameNum++) {
      let progress = Math.round((currentFrameNum / totalFramesCount) * 100);
      btn.innerText = `Processing: ${progress}%`;

      let simulatedTime = selectedStartSeconds + (currentFrameNum / fps);
      let activeFrame = null;
      for (let f of targetFrames) {
        if (simulatedTime >= f.time) activeFrame = f; else break;
      }
      
      textOverlay.innerText = activeFrame ? activeFrame.text : "";
      textFit(textOverlay);

      // Take a clean snapshot without the layout borders/shadows
      const elementCanvas = await html2canvas(targetBox, { 
        backgroundColor: '#FFF', 
        scale: 1.3,
        onclone: (clonedDoc) => {
          const clonedContainer = clonedDoc.getElementById('memeContainer');
          clonedContainer.style.boxShadow = 'none';
          clonedContainer.style.border = 'none';
        }
      });
      
      ctx.clearRect(0, 0, 500, 500);
      
      // Force hardware canvas layer to apply the missing 1.5px blur
      ctx.filter = 'blur(1.5px)'; 
      ctx.drawImage(elementCanvas, 0, 0, 500, 500);
      ctx.filter = 'none'; // Reset filter layer for the next loop frame
      
      const timestampUs = Math.round((currentFrameNum * 1000000) / fps);
      const videoFrame = new VideoFrame(captureCanvas, { timestamp: timestampUs });
      
      encoder.encode(videoFrame);
      videoFrame.close();

      if (currentFrameNum % 12 === 0) {
        await new Promise(r => setTimeout(r, 4));
      }
    }

    btn.innerText = "Finishing file structure...";
    
    await encoder.flush();
    muxer.finalize();

    // 4. Download finalized MP4 payload allocation
    const { buffer } = muxer.target;
    const blob = new Blob([buffer], { type: 'video/mp4' });
    const url = URL.createObjectURL(blob);
    
    const link = document.createElement('a');
    link.download = `brat_lyric_${Date.now()}.mp4`;
    link.href = url;
    link.click();

    btn.disabled = false;
    btn.innerText = "💾 Export MP4";
    textOverlay.innerText = "brat";
    textFit(textOverlay);
  });

  // Startup Init Execution
  textFit(textOverlay);
</script>
</body>
</html>
